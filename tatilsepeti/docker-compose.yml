services:
  postgres:
    image: postgres:16-alpine
    container_name: tatilsepeti_bot_db
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass123
      POSTGRES_DB: tatilsepeti_bot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
